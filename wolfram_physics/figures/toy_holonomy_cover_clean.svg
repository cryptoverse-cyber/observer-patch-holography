<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 480" width="500" height="480" style="background-color: #ffffff; font-family: 'Segoe UI', -apple-system, sans-serif;">
  <defs>
    <marker id="cycle-arrow-3" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 L 2.5 5 z" fill="#c0392b" />
    </marker>
  </defs>

  <style>
    .patch { fill-opacity: 0.08; stroke-width: 2px; }
    .p1 { fill: #2980b9; stroke: #2980b9; }
    .p2 { fill: #d35400; stroke: #d35400; }
    .p3 { fill: #27ae60; stroke: #27ae60; }
    .overlap { font-family: serif; font-size: 15px; fill: #2c3e50; font-style: italic; stroke: #ffffff; stroke-width: 4px; paint-order: stroke; text-anchor: middle; }
    .patch-label { font-size: 22px; font-weight: bold; fill: #7f8c8d; stroke: #ffffff; stroke-width: 5px; paint-order: stroke; }
    .holonomy { font-family: serif; font-size: 18px; fill: #c0392b; font-weight: bold; text-anchor: middle; }
    .cycle-path { fill: none; stroke: #c0392b; stroke-width: 2.5px; stroke-dasharray: 5,5; }
  </style>

  <rect x="0" y="0" width="500" height="480" fill="#ffffff" />

  <circle class="patch p1" cx="200" cy="200" r="120" />
  <circle class="patch p2" cx="300" cy="200" r="120" />
  <circle class="patch p3" cx="250" cy="286" r="120" />

  <text x="130" y="150" class="patch-label">P<tspan baseline-shift="sub" font-size="0.7em">1</tspan></text>
  <text x="350" y="150" class="patch-label">P<tspan baseline-shift="sub" font-size="0.7em">2</tspan></text>
  <text x="250" y="380" class="patch-label" text-anchor="middle">P<tspan baseline-shift="sub" font-size="0.7em">3</tspan></text>

  <text x="250" y="130" class="overlap">b<tspan baseline-shift="sub" font-size="0.7em">12</tspan> = ℓ - t</text>
  <text x="340" y="280" class="overlap">b<tspan baseline-shift="sub" font-size="0.7em">23</tspan> = t - τ</text>
  <text x="160" y="280" class="overlap">b<tspan baseline-shift="sub" font-size="0.7em">31</tspan> = τ - (ℓ⊕χ)</text>

  <path class="cycle-path" d="M 250 168 A 60 60 0 1 1 249.9 168" marker-end="url(#cycle-arrow-3)"/>
  
  <text x="250" y="440" class="holonomy">∑ b<tspan baseline-shift="sub" font-size="0.7em">e</tspan> = χ (mod 2)</text>
</svg>
