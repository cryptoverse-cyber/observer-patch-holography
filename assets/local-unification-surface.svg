<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 920" role="img" aria-labelledby="title desc">
  <title id="title">OPH local unification surface</title>
  <desc id="desc">Diagram showing how the calibrated local UV input P organizes the structural causal speed c, the electroweak boson and Higgs masses, and the gravity-side Newton coupling on one local surface.</desc>
  <defs>
    <style>
      .bg { fill: #f7f3ea; }
      .title { font: 700 34px 'IBM Plex Sans', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; fill: #17212b; }
      .subtitle { font: 500 16px 'IBM Plex Sans', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; fill: #405162; }
      .lane { font: 700 18px 'IBM Plex Sans', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; fill: #17212b; letter-spacing: 0.08em; text-transform: uppercase; }
      .box { rx: 22; ry: 22; stroke-width: 2.5; }
      .boxtext { font: 600 18px 'IBM Plex Sans', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; fill: #17212b; }
      .small { font: 500 15px 'IBM Plex Sans', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; fill: #405162; }
      .value { font: 700 23px 'IBM Plex Sans', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; fill: #17212b; }
      .formula { font: 600 16px 'IBM Plex Sans', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; fill: #17212b; }
      .chip { rx: 14; ry: 14; fill: #ffffff; stroke: #c9bda8; stroke-width: 1.5; }
      .chiptext { font: 600 14px 'IBM Plex Sans', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif; fill: #5a4a39; }
      .arrow-blue { stroke: #2f6ea6; }
      .arrow-gold { stroke: #a56c12; }
      .arrow-green { stroke: #31784f; }
      .arrow-red { stroke: #9b3f30; }
      .arrow-dashed { stroke-dasharray: 10 8; }
    </style>
    <marker id="arrowheadBlue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2f6ea6"/>
    </marker>
    <marker id="arrowheadGold" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#a56c12"/>
    </marker>
    <marker id="arrowheadGreen" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#31784f"/>
    </marker>
    <marker id="arrowheadRed" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#9b3f30"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="920"/>

  <text class="title" x="700" y="56" text-anchor="middle">OPH Local Unification Surface</text>
  <text class="subtitle" x="700" y="86" text-anchor="middle">One calibrated local UV input organizes the structural causal speed, the electroweak boson and Higgs masses, and the gravity-side Newton coupling.</text>

  <text class="lane" x="180" y="148" text-anchor="middle">Structural Lane</text>
  <text class="lane" x="700" y="148" text-anchor="middle">Bosonic Lane</text>
  <text class="lane" x="1170" y="148" text-anchor="middle">Gravity Lane</text>

  <rect class="box" x="530" y="164" width="340" height="92" fill="#fff6e3" stroke="#a56c12"/>
  <text class="boxtext" x="700" y="202" text-anchor="middle">P fixes the local UV scale</text>
  <text class="value" x="700" y="235" text-anchor="middle">a_cell</text>

  <rect class="box" x="70" y="206" width="220" height="82" fill="#eef6ff" stroke="#2f6ea6"/>
  <text class="boxtext" x="180" y="242" text-anchor="middle">Geometric modular flow</text>
  <text class="small" x="180" y="266" text-anchor="middle">on the prime geometric subnet</text>

  <rect class="box" x="70" y="334" width="220" height="82" fill="#eef6ff" stroke="#2f6ea6"/>
  <text class="boxtext" x="180" y="370" text-anchor="middle">Invariant causal speed</text>
  <text class="small" x="180" y="394" text-anchor="middle">structural Lorentz output</text>

  <rect class="box" x="70" y="470" width="220" height="92" fill="#ffffff" stroke="#2f6ea6"/>
  <text class="boxtext" x="180" y="506" text-anchor="middle">LocalFamiliarUnitReadoutPackage</text>
  <text class="small" x="180" y="532" text-anchor="middle">bridges the local display units</text>

  <rect class="box" x="48" y="624" width="264" height="112" fill="#dff1ff" stroke="#2f6ea6"/>
  <text class="boxtext" x="180" y="668" text-anchor="middle">c</text>
  <text class="value" x="180" y="704" text-anchor="middle">299792458 m/s</text>

  <rect class="box" x="542" y="316" width="316" height="82" fill="#eefaf1" stroke="#31784f"/>
  <text class="boxtext" x="700" y="352" text-anchor="middle">alpha_U</text>
  <text class="small" x="700" y="376" text-anchor="middle">unification-scale coupling</text>

  <rect class="box" x="542" y="444" width="316" height="82" fill="#eefaf1" stroke="#31784f"/>
  <text class="boxtext" x="700" y="480" text-anchor="middle">(t_U, t_tr)</text>
  <text class="small" x="700" y="504" text-anchor="middle">transmutation pair</text>

  <rect class="box" x="542" y="572" width="316" height="82" fill="#eefaf1" stroke="#31784f"/>
  <text class="boxtext" x="700" y="608" text-anchor="middle">v</text>
  <text class="small" x="700" y="632" text-anchor="middle">electroweak scale</text>

  <rect class="box" x="476" y="722" width="210" height="112" fill="#dff5e7" stroke="#31784f"/>
  <text class="boxtext" x="581" y="764" text-anchor="middle">M_W</text>
  <text class="value" x="581" y="800" text-anchor="middle">80.377 GeV</text>

  <rect class="box" x="714" y="722" width="210" height="112" fill="#dff5e7" stroke="#31784f"/>
  <text class="boxtext" x="819" y="764" text-anchor="middle">M_Z</text>
  <text class="value" x="819" y="800" text-anchor="middle">91.1879780919 GeV</text>

  <rect class="box" x="936" y="428" width="296" height="98" fill="#f7ece7" stroke="#9b3f30"/>
  <text class="boxtext" x="1084" y="466" text-anchor="middle">ellbar_SU2(t2_run) + ellbar_SU3(t3_run)</text>
  <text class="formula" x="1084" y="498" text-anchor="middle">= P / 4</text>

  <rect class="box" x="936" y="576" width="296" height="98" fill="#f7ece7" stroke="#9b3f30"/>
  <text class="boxtext" x="1084" y="612" text-anchor="middle">ellbar_shared</text>
  <text class="small" x="1084" y="638" text-anchor="middle">Tr(rho_C L_C) / N_Sigma</text>

  <rect class="box" x="948" y="726" width="272" height="108" fill="#fde7e2" stroke="#9b3f30"/>
  <text class="boxtext" x="1084" y="764" text-anchor="middle">G = a_cell / (4 ellbar_shared)</text>
  <text class="value" x="1084" y="802" text-anchor="middle">6.674299995910528e-11</text>

  <rect class="box" x="936" y="246" width="296" height="104" fill="#eefaf1" stroke="#31784f"/>
  <text class="boxtext" x="1084" y="284" text-anchor="middle">sigma_D11,HT</text>
  <text class="formula" x="1084" y="318" text-anchor="middle">alpha_U cos(2 theta_W0) / sqrt(pi)</text>

  <rect class="box" x="936" y="92" width="296" height="104" fill="#dff5e7" stroke="#31784f"/>
  <text class="boxtext" x="1084" y="132" text-anchor="middle">M_H</text>
  <text class="value" x="1084" y="168" text-anchor="middle">125.1995304097179 GeV</text>

  <line x1="700" y1="256" x2="700" y2="314" class="arrow-green" stroke-width="4" marker-end="url(#arrowheadGreen)"/>
  <line x1="700" y1="398" x2="700" y2="442" class="arrow-green" stroke-width="4" marker-end="url(#arrowheadGreen)"/>
  <line x1="700" y1="526" x2="700" y2="570" class="arrow-green" stroke-width="4" marker-end="url(#arrowheadGreen)"/>
  <line x1="644" y1="654" x2="604" y2="720" class="arrow-green" stroke-width="4" marker-end="url(#arrowheadGreen)"/>
  <line x1="756" y1="654" x2="796" y2="720" class="arrow-green" stroke-width="4" marker-end="url(#arrowheadGreen)"/>

  <line x1="858" y1="356" x2="936" y2="318" class="arrow-green" stroke-width="4" marker-end="url(#arrowheadGreen)"/>
  <line x1="1084" y1="246" x2="1084" y2="198" class="arrow-green" stroke-width="4" marker-end="url(#arrowheadGreen)"/>

  <line x1="870" y1="210" x2="1084" y2="210" class="arrow-red" stroke-width="4" marker-end="url(#arrowheadRed)"/>
  <line x1="1084" y1="350" x2="1084" y2="426" class="arrow-red" stroke-width="4" marker-end="url(#arrowheadRed)"/>
  <line x1="1084" y1="526" x2="1084" y2="574" class="arrow-red" stroke-width="4" marker-end="url(#arrowheadRed)"/>
  <line x1="1084" y1="674" x2="1084" y2="724" class="arrow-red" stroke-width="4" marker-end="url(#arrowheadRed)"/>

  <line x1="180" y1="288" x2="180" y2="332" class="arrow-blue" stroke-width="4" marker-end="url(#arrowheadBlue)"/>
  <line x1="180" y1="416" x2="180" y2="468" class="arrow-blue" stroke-width="4" marker-end="url(#arrowheadBlue)"/>
  <line x1="180" y1="562" x2="180" y2="622" class="arrow-blue" stroke-width="4" marker-end="url(#arrowheadBlue)"/>
  <line x1="530" y1="228" x2="290" y2="512" class="arrow-blue arrow-dashed" stroke-width="3.5" marker-end="url(#arrowheadBlue)"/>

  <rect class="chip" x="148" y="842" width="232" height="34"/>
  <text class="chiptext" x="264" y="864" text-anchor="middle">LocalFamiliarUnitReadoutPackage</text>

  <rect class="chip" x="394" y="842" width="216" height="34"/>
  <text class="chiptext" x="502" y="864" text-anchor="middle">SharedEdgeEntropyBridge</text>

  <rect class="chip" x="624" y="842" width="244" height="34"/>
  <text class="chiptext" x="746" y="864" text-anchor="middle">StrictClassicalBranchReleaseClause</text>

  <rect class="chip" x="882" y="842" width="232" height="34"/>
  <text class="chiptext" x="998" y="864" text-anchor="middle">EWTargetFreeRepairChartIdentity_D10</text>

  <rect class="chip" x="1128" y="842" width="224" height="34"/>
  <text class="chiptext" x="1240" y="864" text-anchor="middle">D11LiveForwardExactHiggsPromotion</text>
</svg>
